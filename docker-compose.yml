services:
  pocketbase:
    build:
      context: .
      dockerfile: pb/Dockerfile
    container_name: s22_pocketbase
    restart: unless-stopped
    ports:
      - "8090:8090"
    volumes:
      # pb_data persiste o banco entre rebuilds — nunca commitar
      - ./pb_data:/pb_data
    command: serve --http=0.0.0.0:8090
